name: CI-Release

# Cut a release only when a version tag is pushed (e.g. v1.1.0), so releases are
# deliberate rather than one-per-commit. Build is the plain (release) make, so
# the published .wps has no UDP debug logging.
on:
  push:
    tags:
      - 'v*'

jobs:
  clang-format:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        run: |
          docker run --rm -v ${PWD}:/src ghcr.io/wiiu-env/clang-format:13.0.0-2 -r ./src --exclude ./src/thirdparty
  build-binary:
    runs-on: ubuntu-22.04
    needs: clang-format
    steps:
      - uses: actions/checkout@v4
      - name: create version.h
        run: |
          cat <<EOF > ./src/version.h
          #pragma once
          #define PLUGIN_VERSION_EXTRA " (${{ github.ref_name }})"
          EOF
      - name: build binary
        run: |
          docker build . -t builder
          docker run --rm -v ${PWD}:/project builder make
      - uses: actions/upload-artifact@master
        with:
          name: binary
          path: "*.wps"
  deploy-binary:
    needs: build-binary
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@master
        with:
          name: binary
      - name: Create Release
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          name: SwipSwapMeStream ${{ github.ref_name }}
          files: |
            ./*.wps
